<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – LineSaathi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Space Grotesk', sans-serif; background: #111111; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1f1f1f; border: 1px solid rgba(212,175,119,0.3); border-radius: 1.5rem; width: 100%; max-width: 420px; padding: 2.5rem; }
    /* rest same as before but colors updated */
  </style>
</head>
<body>
  <div class="card text-center">
    <div class="text-5xl mb-4">🔐</div>
    <h1 class="text-3xl font-bold text-[#d4af77]">LineSaathi Admin</h1>
    {% if error %}<div class="mt-6 text-red-400">{{ error }}</div>{% endif %}
    <form method="POST" action="/admin" class="mt-8 space-y-6">
      <input type="password" name="password" placeholder="Enter password" class="w-full bg-[#111] border border-[#d4af77]/30 rounded-2xl px-5 py-4 text-white focus:border-[#d4af77] outline-none" />
      <button type="submit" class="w-full bg-[#d4af77] text-black font-bold py-4 rounded-2xl text-lg">Login →</button>
    </form>
    <a href="/" class="block mt-8 text-[#a8a8a8]">← Back to Dashboard</a>
  </div>
</body>
</html>

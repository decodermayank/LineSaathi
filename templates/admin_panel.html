<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel – LineSaathi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- same modern style as above -->
</head>
<body class="bg-[#111111] text-[#f0f0f0] min-h-screen py-10">
  <div class="max-w-lg mx-auto px-6">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold text-[#d4af77]">⚙️ Admin Panel</h1>
      <a href="/" class="px-6 py-3 border border-[#d4af77]/30 rounded-2xl">← Dashboard</a>
    </div>
    <div class="bg-[#1f1f1f] border border-[#d4af77]/30 rounded-3xl p-8">
      {% if message %}<div class="mb-6 p-4 rounded-2xl bg-[#d4af77]/10 text-[#d4af77]">{{ message }}</div>{% endif %}
      
      <form method="POST" action="/admin_panel">
        <label class="block uppercase text-xs tracking-widest mb-2 text-[#a8a8a8]">Maximum Capacity</label>
        <input type="number" name="capacity" value="{{ capacity }}" class="w-full bg-[#111] border border-[#d4af77]/30 rounded-2xl px-5 py-4 text-2xl font-mono" />
        <button name="save_capacity" value="1" class="mt-6 w-full bg-[#d4af77] text-black font-bold py-4 rounded-2xl text-lg">Save & Return to Dashboard</button>
      </form>

      <div class="my-10 border-t border-[#d4af77]/20"></div>

      <form method="POST" action="/admin_panel">
        <button name="reset_counts" value="1" class="w-full py-4 border border-red-500/30 text-red-400 rounded-2xl font-bold">🔄 Reset Counts & Graph</button>
      </form>

      <a href="/logout" class="block text-center mt-8 text-[#a8a8a8]">Sign Out</a>
    </div>
  </div>
</body>
</html>
